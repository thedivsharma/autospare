<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Suppliers</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: #0d0d0d;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .container {
            padding: 40px;
        }

        .card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 16px;
        }

        table {
            width: 100%;
        }

        th, td {
            padding: 10px;
        }

        a {
            color: #fff;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Suppliers</h2>
    <a href="/suppliers/add">+ Add Supplier</a>

    <div class="card">
        <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Contact</th>
                <th>Email</th>
            </tr>

            <tr th:each="s : ${suppliers}">
                <td th:text="${s.id}"></td>
                <td th:text="${s.name}"></td>
                <td th:text="${s.contact}"></td>
                <td th:text="${s.email}"></td>
            </tr>
        </table>
    </div>

</div>

</body>
</html>
