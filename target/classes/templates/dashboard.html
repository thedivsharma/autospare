<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: #0d0d0d;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        .container {
            padding: 40px;
        }

        .title {
            font-size: 26px;
            margin-bottom: 30px;
        }

        .cards {
            display: flex;
            gap: 20px;
        }

        .card {
            flex: 1;
            background: #1a1a1a;
            padding: 25px;
            border-radius: 16px;
        }

        .value {
            font-size: 28px;
            margin-top: 10px;
        }

        .low {
            color: #ff4d4d;
        }

        .nav {
            margin-top: 30px;
        }

        a {
            color: white;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="title">📊 Dashboard</div>

    <div class="cards">
        <div class="card">
            Total Parts
            <div class="value" th:text="${totalParts}"></div>
        </div>

        <div class="card">
            Low Stock
            <div class="value low" th:text="${lowStock}"></div>
        </div>

        <div class="card">
            Total Value (₹)
            <div class="value" th:text="${#numbers.formatDecimal(totalValue,0,0)}"></div>
        </div>
    </div>

    <div class="nav">
        <a href="/parts/list">→ Go to Inventory</a>
    </div>

</div>

</body>
</html>
