<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Supplier</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: #0d0d0d;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .container {
            max-width: 500px;
            margin: 80px auto;
        }

        .card {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 16px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #0f0f0f;
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 20px;
            border: none;
            background: white;
            color: black;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">
        <h3>Add Supplier</h3>

        <form th:action="@{/suppliers/save}" th:object="${supplier}" method="post">
            <input type="text" placeholder="Name" th:field="*{name}" required>
            <input type="text" placeholder="Contact" th:field="*{contact}" required>
            <input type="email" placeholder="Email" th:field="*{email}" required>

            <button type="submit">Save</button>
        </form>
    </div>
</div>

</body>
</html>
