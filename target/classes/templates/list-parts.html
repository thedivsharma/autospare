<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>AutoSpare</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0d0d0d;
            color: #ffffff;
        }

        .container {
            padding: 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            font-size: 28px;
            font-weight: 600;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn-add {
            background-color: #ffffff;
            color: #000;
        }

        .btn-add:hover {
            background-color: #ddd;
        }

        .card {
            margin-top: 30px;
            background: #1a1a1a;
            border-radius: 16px;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            font-weight: 400;
            color: #888;
            padding: 12px;
        }

        td {
            padding: 14px 12px;
            border-top: 1px solid #2a2a2a;
        }

        tr:hover {
            background-color: #222;
        }

        .low-stock {
            color: #ff4d4d;
            font-weight: 500;
        }

        .action a {
            margin-right: 10px;
            text-decoration: none;
            font-size: 13px;
        }

        .edit {
            color: #facc15;
        }

        .delete {
            color: #ef4444;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <div class="title">AutoSpare Inventory</div>
        <a href="/parts/add" class="btn btn-add">+ Add Part</a>
    </div>

    <div class="card">

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Quantity</th>
                    <th>Price (₹)</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="part : ${parts}">
                    <td th:text="${part.id}"></td>
                    <td th:text="${part.name}"></td>
                    <td th:text="${part.category}"></td>

                    <!-- LOW STOCK STYLE -->
                    <td th:text="${part.quantity}"
                        th:classappend="${part.quantity < 10} ? 'low-stock' : ''">
                    </td>

                    <td th:text="${#numbers.formatDecimal(part.price,0,0)}"></td>

                    <td class="action">
                        <a th:href="@{'/parts/edit/' + ${part.id}}" class="edit">Edit</a>
                        <a th:href="@{'/parts/delete/' + ${part.id}}" class="delete"
                           onclick="return confirm('Delete this item?');">Delete</a>
                    </td>
                </tr>
            </tbody>

        </table>

    </div>

</div>

</body>
</html>
