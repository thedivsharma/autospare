<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: #0d0d0d;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        .container {
            padding: 40px;
        }

        .title {
            font-size: 26px;
            margin-bottom: 30px;
        }

        .cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            min-width: 220px;
            background: #1a1a1a;
            padding: 25px;
            border-radius: 16px;
        }

        .value {
            font-size: 28px;
            margin-top: 10px;
        }

        .low {
            color: #ff4d4d;
        }

        .section-title {
            margin-top: 40px;
            margin-bottom: 15px;
            font-size: 20px;
        }

        .modules {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }

        .btn {
            background: #1a1a1a;
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 14px;
            display: block;
            transition: 0.3s;
        }

        .btn:hover {
            background: #2a2a2a;
        }

        .logout {
            margin-top: 30px;
            display: inline-block;
            color: #ff4d4d;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="title">📊 Admin Dashboard</div>

    <div class="cards">

        <div class="card">
            Total Parts
            <div class="value" th:text="${totalParts}"></div>
        </div>

        <div class="card">
            Low Stock
            <div class="value low" th:text="${lowStock}"></div>
        </div>

        <div class="card">
            Total Value (₹)
            <div class="value"
                 th:text="${#numbers.formatDecimal(totalValue,0,0)}"></div>
        </div>

    </div>

    <div class="section-title">System Modules</div>

    <div class="modules">

        <a href="/parts/list" class="btn">📦 Inventory</a>

        <a href="/reports" class="btn">📄 Reports</a>

        <a href="/alerts" class="btn">🚨 Alerts</a>

        <a href="/orders" class="btn">🛒 Orders</a>

        <a href="/suppliers/list" class="btn">🚚 Suppliers</a>

    </div>

    <a href="/logout" class="logout">Logout</a>

</div>

</body>
</html>
