<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Orders</title>

    <style>
        body{
            background:#111;
            color:white;
            font-family:Arial;
            padding:40px;
        }

        .box{
            background:#1a1a1a;
            padding:25px;
            border-radius:14px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        th,td{
            padding:12px;
            border-bottom:1px solid #333;
            text-align:left;
        }

        th{
            color:#aaa;
        }

        .empty{
            color:#999;
            margin-top:20px;
        }

        a{
            color:white;
            text-decoration:none;
            display:inline-block;
            margin-top:20px;
        }
    </style>
</head>

<body>

<div class="box">

<h1>🛒 Orders</h1>

<div th:if="${#lists.isEmpty(orders)}" class="empty">
    No customer orders placed yet.
</div>

<table th:if="${!#lists.isEmpty(orders)}">

    <thead>
        <tr>
            <th>ID</th>
            <th>Customer</th>
            <th>Item</th>
            <th>Total ₹</th>
            <th>Status</th>
            <th>Date</th>
        </tr>
    </thead>

    <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.orderId}"></td>
            <td th:text="${order.customerName}"></td>
            <td th:text="${order.itemName}"></td>
            <td th:text="${order.total}"></td>
            <td th:text="${order.status}"></td>
            <td th:text="${order.orderDate}"></td>
        </tr>
    </tbody>

</table>

<a href="/parts/dashboard">Back to Dashboard</a>

</div>

</body>
</html>
