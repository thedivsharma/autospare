<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Part</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #333;
    background: #0f0f0f;
    color: white;
    transition: 0.3s;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 20px;
    border: none;
    background: white;
    color: black;
    font-weight: 600;
    transition: 0.2s;
}
        body {
            background-color: #f5f7fa;
        }
        .container {
            margin-top: 50px;
            max-width: 600px;
        }
        .card {
            border-radius: 15px;
        }
        .btn-custom {
            border-radius: 20px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card shadow p-4">
        <h3 class="mb-4 text-center">➕ Add New Part</h3>

        <form th:action="@{/parts/save}" th:object="${part}" method="post">

            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" th:field="*{name}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Category</label>
                <input type="text" class="form-control" th:field="*{category}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Quantity</label>
                <input type="number" class="form-control" th:field="*{quantity}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Price (₹)</label>
                <input type="number" step="0.01" class="form-control" th:field="*{price}" required>
            </div>

            <div class="d-flex justify-content-between">
                <a href="/parts/list" class="btn btn-secondary btn-custom">← Back</a>
                <button type="submit" class="btn btn-success btn-custom">Save Part</button>
            </div>

        </form>
    </div>

</div>
<script>
    // Smooth focus effect
    const inputs = document.querySelectorAll("input");

    inputs.forEach(input => {
        input.addEventListener("focus", () => {
            input.style.borderColor = "#ffffff";
            input.style.boxShadow = "0 0 8px rgba(255,255,255,0.3)";
        });

        input.addEventListener("blur", () => {
            input.style.borderColor = "#333";
            input.style.boxShadow = "none";
        });
    });

    // Simple validation before submit
    document.querySelector("form").addEventListener("submit", function(e) {
        let valid = true;

        inputs.forEach(input => {
            if (!input.value) {
                valid = false;
                input.style.borderColor = "red";
            }
        });

        if (!valid) {
            e.preventDefault();
            alert("Please fill all fields!");
        }
    });

    // Smooth button press effect
    const button = document.querySelector("button");

    button.addEventListener("mousedown", () => {
        button.style.transform = "scale(0.95)";
    });

    button.addEventListener("mouseup", () => {
        button.style.transform = "scale(1)";
    });
</script>
</body>
</html>
